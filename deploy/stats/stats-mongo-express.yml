apiVersion: apps/v1
kind: Deployment
metadata:
  name: stats-mongo-express-deploy
  namespace: stats
  labels:
    mongo-express: stats
spec:
  replicas: 1
  selector:
    matchLabels:
      mongo-express: stats
  template:
    metadata:
      labels:
        mongo-express: stats
    spec:
      containers:
        - name: stats-mongo-express-container
          image: mongo-express:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: ME_CONFIG_MONGODB_ENABLE_ADMIN
              value: "true"
            - name: ME_CONFIG_MONGODB_SERVER
              value: stats-mongo.stats
            - name: ME_CONFIG_MONGODB_PORT
              value: "27017"
            - name: ME_CONFIG_MONGODB_ADMINUSERNAME
              valueFrom:
                secretKeyRef:
                  name: stats-mongo-secret
                  key: username
            - name: ME_CONFIG_MONGODB_ADMINPASSWORD
              valueFrom:
                secretKeyRef:
                  name: stats-mongo-secret
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: stats-mongo-express
  namespace: stats
spec:
  type: NodePort
  selector:
    mongo-express: stats
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
