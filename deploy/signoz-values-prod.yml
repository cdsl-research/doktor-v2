global:
  cloud: others
  clusterName: doktor-kube
  deploymentEnvironment: production
otelCollectorEndpoint: http://192.168.40.20:4318  # otlphttp (chart uses otlphttp exporter; needs scheme + URL)
otelInsecure: true
presets:
  # debugExporter:
  #   enabled: true
  otlpExporter:
    enabled: true  # grpc
  hostMetrics:
    enabled: true
    collectionInterval: 60s
  logsCollection:
    enabled: true
    blacklist:
      enabled: true
      namespaces:
        - kube-system
  kubeletMetrics:
    enabled: true
    collectionInterval: 60s
  kubernetesAttributes:
    enabled: true
otelAgent:
  enabled: true
otelDeployment:
  enabled: true

